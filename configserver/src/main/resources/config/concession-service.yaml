server:
  port: 8086

spring:
  datasource:
    url: jdbc:postgresql://localhost:5442/concession_db
    username: ${DB_USER:concession_service}
    password: ${DB_PASS:concession_service}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/cinema-system
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

services:
  cinema-url: http://cinema-service